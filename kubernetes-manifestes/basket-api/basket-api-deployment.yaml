# kubernetes-manifests/basket-api/basket-api-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: basket-api
spec:
  selector:
    matchLabels:
      app: basket-api
  template:
    metadata:
      labels:
        app: basket-api
    spec:
      containers:
      - name: basket-api
        image: ajkabs/basket-api:latest
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: Development
        - name: ConnectionStrings__Redis
          value: redis:6379
        - name: ConnectionStrings__EventBus
          value: amqp://guest:guest@rabbitmq:5672
        - name: Identity__Url
          value: http://identity-api:5105
        - name: ASPNETCORE_URLS
          value: http://*:5104
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: basket-data-protection
          mountPath: /root/.aspnet/DataProtection-Keys
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        # You'll need to include wait-for-it.sh in your container image
        # or use an init container to check dependencies
        command: ["/bin/sh", "-c"]
        args: ["/wait-for-it.sh redis:6379 -- /wait-for-it.sh rabbitmq:5672 -- dotnet Basket.API.dll"]
      volumes:
      - name: basket-data-protection
        persistentVolumeClaim:
          claimName: basket-data-protection-pvc
